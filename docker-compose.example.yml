services:
  gsc-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gsc-mcp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      MCP_MODE: http
      HOST: 0.0.0.0
      PORT: 3001
      LOG_LEVEL: info
      GSC_DEFAULT_SITE: "${GSC_DEFAULT_SITE}"
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON}"
      MCP_AUTH_TOKEN: "${MCP_AUTH_TOKEN}"
